<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | Nexa Trading Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0e11; color: #eaecef; }
        .login-card { background-color: #1e2329; border: 1px solid #30363d; }
    </style>
</head>
<body class="font-sans antialiased flex items-center justify-center h-screen px-4">

    <div class="login-card p-8 rounded-xl w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-yellow-500 mb-2">
                <i class="fa-solid fa-user-plus mr-2"></i>NEXA AI
            </h1>
            <p class="text-gray-400 text-sm">Créez votre compte de trading automatisé</p>
        </div>

        <form id="register-form" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Nom Complet</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500"><i class="fa-solid fa-user"></i></span>
                    <input type="text" id="full_name" class="w-full bg-[#0b0e11] border border-gray-700 p-3 pl-10 rounded-lg text-white focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 outline-none transition" placeholder="Mohamed Ashraf" required>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Adresse Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" id="email" class="w-full bg-[#0b0e11] border border-gray-700 p-3 pl-10 rounded-lg text-white focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 outline-none transition" placeholder="nom@exemple.com" required>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Mot de passe</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="password" class="w-full bg-[#0b0e11] border border-gray-700 p-3 pl-10 rounded-lg text-white focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 outline-none transition" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="w-full bg-yellow-500 text-black font-black py-3 rounded-lg hover:bg-yellow-400 transform active:scale-95 transition-all duration-200 mt-2">
                CRÉER MON COMPTE
            </button>
        </form>

        <div class="text-center mt-6">
            <p class="text-gray-400 text-sm">
                Déjà un compte ? 
                <a href="/login" class="text-yellow-500 font-bold hover:underline">Se connecter</a>
            </p>
        </div>

        <div id="msg-box" class="mt-4 p-3 rounded-lg hidden text-center font-bold text-xs">
            <p id="msg"></p>
        </div>
    </div>

    <script>
        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                full_name: document.getElementById('full_name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            const msgBox = document.getElementById('msg-box');
            const msg = document.getElementById('msg');
            msgBox.classList.remove('hidden');

            try {
                const res = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();

                if (res.ok) {
                    msgBox.className = "mt-4 p-3 bg-green-500/10 border border-green-500/50 rounded-lg text-center font-bold text-xs text-green-500";
                    msg.innerText = "Inscription réussie ! Redirection...";
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    msgBox.className = "mt-4 p-3 bg-red-500/10 border border-red-500/50 rounded-lg text-center font-bold text-xs text-red-500";
                    msg.innerText = data.detail || "Erreur lors de l'inscription";
                }
            } catch(err) {
                msgBox.className = "mt-4 p-3 bg-red-500/10 border border-red-500/50 rounded-lg text-center font-bold text-xs text-red-500";
                msg.innerText = "Serveur injoignable.";
            }
        };
    </script>
</body>
</html>
