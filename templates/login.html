<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Nexa Trading Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0e11; color: #eaecef; }
        .card { background-color: #1e2329; border: 1px solid #30363d; }
        .gradient-text { background: linear-gradient(90deg, #f0b90b, #f8d33a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="font-sans antialiased flex items-center justify-center h-screen px-4">

    <div class="card p-10 rounded-2xl w-full max-w-md shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-1 bg-gradient-to-r from-transparent via-yellow-500 to-transparent opacity-50"></div>

        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold gradient-text mb-3">
                <i class="fa-solid fa-robot mr-2"></i>NEXA AI
            </h1>
            <p class="text-gray-400 text-sm">Accédez à votre espace de trading automatisé</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Adresse Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500">
                        <i class="fa-solid fa-envelope text-sm"></i>
                    </span>
                    <input type="email" id="email" 
                        class="w-full bg-[#0b0e11] border border-gray-700 py-3 pl-11 pr-4 rounded-lg text-white focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 outline-none transition-all duration-200" 
                        placeholder="nom@exemple.com" required>
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest">Mot de passe</label>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500">
                        <i class="fa-solid fa-lock text-sm"></i>
                    </span>
                    <input type="password" id="password" 
                        class="w-full bg-[#0b0e11] border border-gray-700 py-3 pl-11 pr-4 rounded-lg text-white focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 outline-none transition-all duration-200" 
                        placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-gradient-to-r from-[#f0b90b] to-[#f8d33a] text-black font-bold py-3 rounded-lg hover:opacity-90 transform active:scale-[0.98] transition-all duration-200 shadow-lg shadow-yellow-500/20">
                SE CONNECTER
            </button>
        </form>

        <div class="flex items-center my-8">
            <div class="flex-1 border-t border-gray-800"></div>
            <span class="px-4 text-gray-600 text-[10px] uppercase font-bold tracking-widest">Ou</span>
            <div class="flex-1 border-t border-gray-800"></div>
        </div>

        <div class="text-center">
            <p class="text-gray-400 text-sm">
                Pas encore de compte ? 
                <a href="/register" class="text-yellow-500 font-bold hover:text-yellow-400 transition-colors">Créer un accès</a>
            </p>
        </div>

        <div id="error-box" class="mt-6 p-3 bg-red-500/10 border border-red-500/30 rounded-lg hidden transition-all duration-300">
            <p id="error-msg" class="text-red-500 text-xs text-center font-bold"></p>
        </div>
    </div>

    <script>
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('username', document.getElementById('email').value);
            formData.append('password', document.getElementById('password').value);

            const errorBox = document.getElementById('error-box');
            const errorMsg = document.getElementById('error-msg');

            try {
                const response = await fetch('/auth/login', { method: 'POST', body: formData });
                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.access_token);
                    window.location.href = '/dashboard';
                } else {
                    errorMsg.innerText = data.detail || "Identifiants incorrects.";
                    errorBox.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.innerText = "Serveur injoignable. Vérifiez que l'API tourne.";
                errorBox.classList.remove('hidden');
            }
        };

        // Cache l'erreur à la saisie
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', () => {
                document.getElementById('error-box').classList.add('hidden');
            });
        });
    </script>
</body>
</html>
