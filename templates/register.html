<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | Nexa Trading Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0e11; color: #eaecef; }
        .card { background-color: #1e2329; border: 1px solid #30363d; }
        .gradient-text { background: linear-gradient(90deg, #f0b90b, #f8d33a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="font-sans antialiased flex items-center justify-center h-screen px-4">

    <div class="card p-10 rounded-2xl w-full max-w-md shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-1 bg-gradient-to-r from-transparent via-yellow-500 to-transparent opacity-50"></div>

        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold gradient-text mb-3">
                <i class="fa-solid fa-user-shield mr-2"></i>NEXA AI
            </h1>
            <p class="text-gray-400 text-sm">Initialisation de votre profil investisseur</p>
        </div>

        <form id="register-form" class="space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Prénom</label>
                    <input type="text" id="prenom" 
                        class="w-full bg-[#0b0e11] border border-gray-700 py-3 px-4 rounded-lg text-white focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 outline-none transition-all duration-200" 
                        placeholder="Mohamed" required>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Nom</label>
                    <input type="text" id="nom" 
                        class="w-full bg-[#0b0e11] border border-gray-700 py-3 px-4 rounded-lg text-white focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 outline-none transition-all duration-200" 
                        placeholder="Ashraf" required>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Adresse Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500">
                        <i class="fa-solid fa-envelope text-sm"></i>
                    </span>
                    <input type="email" id="email" 
                        class="w-full bg-[#0b0e11] border border-gray-700 py-3 pl-11 pr-4 rounded-lg text-white focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 outline-none transition-all duration-200" 
                        placeholder="nom@exemple.com" required>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Mot de passe sécurisé</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500">
                        <i class="fa-solid fa-lock text-sm"></i>
                    </span>
                    <input type="password" id="password" 
                        class="w-full bg-[#0b0e11] border border-gray-700 py-3 pl-11 pr-4 rounded-lg text-white focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 outline-none transition-all duration-200" 
                        placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-gradient-to-r from-[#f0b90b] to-[#f8d33a] text-black font-bold py-3 mt-4 rounded-lg hover:opacity-90 transform active:scale-[0.98] transition-all duration-200 shadow-lg shadow-yellow-500/20">
                CRÉER MON COMPTE
            </button>
        </form>

        <div class="text-center mt-8">
            <p class="text-gray-400 text-sm">
                Vous avez déjà un accès ? 
                <a href="/login" class="text-yellow-500 font-bold hover:text-yellow-400 transition-colors">S'identifier</a>
            </p>
        </div>

        <div id="msg-box" class="mt-6 p-3 rounded-lg hidden transition-all duration-300 border">
            <p id="msg" class="text-xs text-center font-bold"></p>
        </div>
    </div>

    <script>
        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            
            // Le payload correspond exactement au UserCreate Pydantic de main.py
            const payload = {
                prenom: document.getElementById('prenom').value,
                nom: document.getElementById('nom').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            const msgBox = document.getElementById('msg-box');
            const msg = document.getElementById('msg');
            
            // État de chargement visuel
            const btn = document.querySelector('button[type="submit"]');
            const originalBtnText = btn.innerText;
            btn.innerText = "CRÉATION EN COURS...";
            btn.disabled = true;

            try {
                const res = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                msgBox.classList.remove('hidden');

                if (res.ok) {
                    msgBox.className = "mt-6 p-3 bg-green-500/10 border border-green-500/30 rounded-lg text-green-500 transition-all duration-300";
                    msg.innerText = "Succès ! Redirection vers la connexion...";
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    msgBox.className = "mt-6 p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-red-500 transition-all duration-300";
                    msg.innerText = data.detail || "Une erreur est survenue";
                    btn.innerText = originalBtnText;
                    btn.disabled = false;
                }
            } catch(err) {
                msgBox.classList.remove('hidden');
                msgBox.className = "mt-6 p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-red-500 transition-all duration-300";
                msg.innerText = "Serveur injoignable.";
                btn.innerText = originalBtnText;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
