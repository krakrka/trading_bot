<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><title>Inscription | Nexa Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0e11] text-white flex items-center justify-center h-screen">
    <div class="bg-[#1e2329] p-8 rounded-xl border border-gray-800 w-96 shadow-2xl">
        <h2 class="text-2xl font-bold mb-6 text-center text-yellow-500">Créer un compte</h2>
        <form id="register-form" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">Nom complet</label>
                <input type="text" id="full_name" class="w-full bg-[#0b0e11] border border-gray-700 p-2 rounded focus:border-yellow-500 outline-none text-white" placeholder="Username" required>
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Email</label>
                <input type="email" id="email" class="w-full bg-[#0b0e11] border border-gray-700 p-2 rounded focus:border-yellow-500 outline-none text-white" placeholder="nom@exemple.com" required>
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Mot de passe</label>
                <input type="password" id="password" class="w-full bg-[#0b0e11] border border-gray-700 p-2 rounded focus:border-yellow-500 outline-none text-white" required>
            </div>
            <button type="submit" class="w-full bg-yellow-500 text-black font-bold py-2 rounded hover:bg-yellow-400 transition mt-4">S'inscrire</button>
        </form>
        <p class="text-gray-500 text-xs mt-6 text-center">
            Déjà un compte ? <a href="/login" class="text-yellow-500 hover:underline">Se connecter</a>
        </p>
        <p id="msg" class="text-xs mt-4 hidden text-center"></p>
    </div>

    <script>
        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                full_name: document.getElementById('full_name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            const res = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            const data = await res.json();
            const msg = document.getElementById('msg');
            msg.classList.remove('hidden');

            if (res.ok) {
                msg.className = "text-green-500 text-xs mt-4 text-center";
                msg.innerText = "Inscription réussie ! Redirection...";
                setTimeout(() => window.location.href = '/login', 2000);
            } else {
                msg.className = "text-red-500 text-xs mt-4 text-center";
                msg.innerText = data.detail || "Erreur lors de l'inscription";
            }
        };
    </script>
</body>
</html>
